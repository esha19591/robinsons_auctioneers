server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: allow client side routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Prevent caching of index.html to allow new deployments to show up quickly
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
