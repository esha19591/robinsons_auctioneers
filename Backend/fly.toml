# fly.toml app configuration file generated for robinsons-auctioneers-green-pine-3150 on 2026-03-13T15:22:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'robinsons-auctioneers'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'

[[mounts]]
  source = 'data'
  destination = '/app'

[[services]]
  protocol = 'tcp'
  internal_port = 3000

  [[services.ports]]
    port = 80

  [[services.ports]]
    port = 443

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
