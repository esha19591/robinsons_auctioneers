version: "3.9"

services:
  backend:
    build:
      context: ./Backend
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database across container restarts
      - backend-data:/app
    # Add any runtime env vars here (e.g., secrets)
    environment:
      # Example: override CORS origins, auth secrets, etc.
      # BACKEND_SECRET: "supersecret"

  frontend:
    build:
      context: ./Frontend
      args:
        # This will be baked into the built frontend bundle.
        VITE_API_URL: http://backend:3000
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  backend-data:
